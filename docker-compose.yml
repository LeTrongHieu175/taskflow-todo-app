services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    volumes:
      - taskflow_data:/app/App_Data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:${BACKEND_PORT:-5000}/api
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-4173}:4173"

volumes:
  taskflow_data:
